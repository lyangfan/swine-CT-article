# MedNeXt-L (vendored, MICCAI 2023) — Large variant, verbatim upstream config.
network: mednext_l
architecture: "MedNeXt-L (n_channels=32, k=3, exp_r=[3,4,8,8,8,8,8,4,3], block_counts=[3,4,8,8,8,8,8,4,3], checkpoint=outside_block, DS=5)"
forward_protocol: deep_supervision        # 5-level decoder DS (isotropic), same topology as S
family: cnn                               # SGD + poly (MedNeXt paper default)
build:
  in_channels: 1
  n_channels: 32
  n_classes: 10
  exp_r: [3, 4, 8, 8, 8, 8, 8, 4, 3]      # Large: per-level expansion ratio
  kernel_size: 3
  norm_type: group
  deep_supervision: true
  do_res: true
  do_res_up_down: true
  block_counts: [3, 4, 8, 8, 8, 8, 8, 4, 3]   # Large: deep per-level block counts
  checkpoint_style: outside_block         # gradient checkpointing (memory safety on 40GB A100)
deep_supervision_scales_override:
  - [1.0, 1.0, 1.0]                       # same 5-level isotropic topology as S
  - [0.5, 0.5, 0.5]
  - [0.25, 0.25, 0.25]
  - [0.125, 0.125, 0.125]
  - [0.0625, 0.0625, 0.0625]
optimizer:
  type: SGD
  lr: 0.01
  momentum: 0.99
  weight_decay: 3.0e-4
  nesterov: true
  scheduler: poly_lr                      # same as nnU-Net v1 / MedNeXt-S
loss:
  type: DC_and_CE_loss
  deep_supervision: MultipleOutputLoss2   # DS weights: 1/2^i, drop lowest, renorm (5 levels)
  batch_dice: true
budget:
  max_num_epochs: 500
  num_batches_per_epoch: 250
  num_val_batches_per_epoch: 50
  effective_batch: 2
checkpoint: model_final_checkpoint.model
determinism:
  cudnn_deterministic: true
  cudnn_benchmark: false
  fp16: true
note: "checkpoint_style does NOT affect accuracy (pure memory/compute trade-off). Same fairness contract as all other networks."
